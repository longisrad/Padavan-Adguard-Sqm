name: Build firmware

on:
  workflow_dispatch:
  push:
    branches:
      - master  # Tự động chạy khi bạn push lên nhánh master

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    steps:
    - uses: actions/checkout@v4

    - name: Get variables
      run: |
        sed -i 's|\r$||g' variables build.config
        . <(cat variables build.config)
        for v in "${!PADAVAN_@}" "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    # 1. TỰ BIÊN DỊCH TOOLCHAIN THỦ CÔNG (Đã ép cờ né lỗi GCC mới trên Ubuntu 24.04)
    - name: Build Toolchain
      run: |
        git config --global --add safe.directory '*'
        
        # Ép trình biên dịch bỏ qua các lỗi kiểm tra nghiêm ngặt của Ubuntu 24.04 khi dịch mã nguồn cũ
        export CFLAGS="-w -O2"
        export CXXFLAGS="-w -O2 -fpermissive"
        
        cd toolchain
        chmod +x build_toolchain.sh clean_sources.sh
        ./clean_sources.sh
        ./build_toolchain.sh

    # ĐÃ XÓA BƯỚC INSTALL THEMES TRÊN MẠNG ĐỂ BẢO VỆ CÁC FILE WWW BẠN TỰ MOD QUẢN LÝ QOS/ADGUARD

    # 2. BƯỚC GHI ĐÈ THÔNG MINH: Bốc file cấu hình tính năng ngoài gốc ném vào đúng vị trí mẫu bo mạch
    - name: Inject Custom Optimized Configs
      run: |
        # Chép file cấu hình tính năng của bạn đè vào file mẫu của bo mạch NEWIFI-D2
        if [ -f "$GITHUB_WORKSPACE/build.config" ]; then
          cp -f $GITHUB_WORKSPACE/build.config trunk/configs/templates/NEWIFI-D2.config
        fi

    # 3. TIẾN HÀNH BIÊN DỊCH FIRMWARE THEO CHUẨN ĐƯỜNG DẪN CỦA PADAVAN-NG
    - name: Build firmware
      run: |
        cd trunk
        chmod +x clear_tree.sh build_firmware.sh
        
        # Dọn dẹp các file rác nhưng giữ nguyên mã nguồn www bạn đã mod
        ./clear_tree.sh
        
        # Gọi script biên dịch chuẩn và truyền tên bo mạch chính xác của mã nguồn padavan-ng
        ./build_firmware.sh NEWIFI-D2

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || : '

    - name: Prepare artifacts
      run: |
        cp "trunk/images/$FW_FILE_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: padavan-ng_NEWIFI-D2_ManualCompile_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.FW_FILE_NAME }}
          build.config

    - name: Check firmware size
      run: |
        partitions=trunk/configs/boards/NEWIFI/NEWIFI-D2/partitions.config
        max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
        fw_size="$(stat -c %s "$FW_FILE_NAME")"
        if ((fw_size > max_fw_size)); then
          echo "Firmware size exceeds partition size"
          exit 1
        fi
        
