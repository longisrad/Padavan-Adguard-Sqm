name: Build Padavan Firmware (Dockerfile Standard)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Mã nguồn từ Repo hiện tại
      uses: actions/checkout@v4

    - name: Cài đặt Dependencies hệ thống
      run: |
        sudo apt-get update
        sudo apt install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd \
            fakeroot kmod cpio git python3-docutils gettext automake autopoint \
            texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin \
            libctf-nobfd0 libcunit1-dev libhdf5-dev libopenblas-dev zstd -y

    - name: Cấu hình Toolchain build sẵn (Chuẩn Padavan-NG)
      run: |
        export PADAVAN_TOOLCHAIN_URL="https://gitlab.com/api/v4/projects/hadzhioglu%2Fpadavan-ng/packages/generic/toolchain/latest/toolchain.tzst"
        curl -L -s "$PADAVAN_TOOLCHAIN_URL" | tar -xJ -C toolchain --strip-components=1

    - name: Compile Firmware
      run: |
        cd trunk
        sudo ./clear_tree
        
        # 1. Kiểm tra và chép đè file cấu hình tính năng (Chấp nhận cả 2 cách đặt tên)
        if [ -f "$GITHUB_WORKSPACE/NEWIFI3.config" ]; then
          cp -f $GITHUB_WORKSPACE/NEWIFI3.config configs/templates/NEWIFI3.config
        elif [ -f "$GITHUB_WORKSPACE/newifi-d2.config" ]; then
          cp -f $GITHUB_WORKSPACE/newifi-d2.config configs/templates/NEWIFI3.config
        elif [ -f "$GITHUB_WORKSPACE/newifi-d2.config.txt" ]; then
          cp -f $GITHUB_WORKSPACE/newifi-d2.config.txt configs/templates/NEWIFI3.config
        else
          echo "⚠️ Không tìm thấy file config nào ở thư mục gốc!"
        fi
        
        # Tạo file .config gốc từ template vừa chép
        cp -f configs/templates/NEWIFI3.config .config
        
        # 2. Chép đè cấu hình Kernel tối ưu vào đúng thư mục board của NEWIFI3
        if [ -f "$GITHUB_WORKSPACE/kernel-3.4.x.config" ]; then
          cp -f $GITHUB_WORKSPACE/kernel-3.4.x.config configs/boards/NEWIFI3/kernel-3.4.x.config
        elif [ -f "$GITHUB_WORKSPACE/kernel-3.4.x.config.txt" ]; then
          cp -f $GITHUB_WORKSPACE/kernel-3.4.x.config.txt configs/boards/NEWIFI3/kernel-3.4.x.config
        fi
        
        # Tiến hành build bằng script sinh firmware cho NEWIFI3
        fakeroot ./build_firmware_modify NEWIFI3

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: Padavan_NEWIFI3_Optimized
        path: trunk/images/*.trx
        
